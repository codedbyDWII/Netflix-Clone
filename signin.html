<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <div class="global-nav">
        <img class="logo" src="https://assets.codepen.io/17809189/netflix-3.svg">
      </div>
      <div class="signin-overlay"></div>

    <div class="signin-hero">
        <h1 class="signin-title">Enter your information to sign in</h1>
        <p class="signin-subtitle">Or get started with a new account</p>
        <div class="signin-form">
            <input class="signin-input"placeholder="Email or mobile number">
            <button class="continue-button">Continue</button>
        </div>
            <a class="signin-help" href="#">Get Help ⌄</a> 
        <p class="captcha">This page is protected by Google reCAPTCHA to ensure you're not a bot.</p>
    </div>
</body>
</html>
