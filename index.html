<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Martel+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen</title>
  </head>
  
  <body>
    <div class="banner">
      <div class="nav">
        <img class="logo" src="https://assets.codepen.io/17809189/netflix-3.svg">
        <div class="nav-right">
          <select class="language">
            <option>English</option>
            <option>Español</option>
          </select>
          <button class="signin">Sign In</button>
        </div>
      </div>
      <div class="overlay"></div>
      <div class="hero">
        <h1>Unlimited movies, TV shows, and more</h1>
        <p class="subtitle">
          Starts at $8.99. Cancel anytime.</p>
        <p class="description"> 
          Ready to watch? Enter your email to create or restart your membership.</p>
        <div class="signup">
          <input placeholder="Email address"> 
          <button>Get Started ></button>
        </div>
    </div>
  </body>
  
</html>
